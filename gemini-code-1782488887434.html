<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PancakeSwap Pro Native Terminal</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-base: #0b0e14; --bg-panel: #151a25; --accent-cyan: #00e7df;
            --accent-purple: #9d4edd; --bull-green: #00c853; --bear-red: #ff3d00;
            --text-main: #f0f6fc; --text-dim: #8b949e;
        }
        body { font-family: monospace; background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { background: var(--bg-panel); padding: 15px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid #2d3748; }
        .price { font-size: 1.5rem; font-weight: bold; color: var(--accent-cyan); }
        .signal { font-size: 2rem; font-weight: 900; margin: 10px 0; }
        .up { color: var(--bull-green); } .down { color: var(--bear-red); }
        #tv-container { height: 400px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="status">CONNECTING TO BSC...</h2>
            <div id="global-price" class="price">$---.--</div>
            <button onclick="document.getElementById('tv-container').style.display = (document.getElementById('tv-container').style.display === 'block' ? 'none' : 'block')">Toggle Chart</button>
        </div>

        <div id="tv-container"><div id="tradingview_widget"></div></div>

        <div class="grid">
            <div class="card"><h3>Previous Round</h3><div id="prev-price" class="price">---</div></div>
            <div class="card"><h3>Live Round</h3><div id="live-price" class="price">---</div><div id="timer">00:00</div></div>
            <div class="card">
                <h3>Next Round Prediction</h3>
                <div id="engine-signal" class="signal">SYNCING</div>
                <div id="engine-reasoning">Analyzing on-chain momentum...</div>
            </div>
        </div>
    </div>

    <script>
        const ORACLE_ADDR = "0x0567F2323251f0Aab15c8dFb1967E4e8A7D42aeE";
        const PREDICTION_ADDR = "0x18B2A687610328590Bc8F2e5fEdDe3b582A49cdA";
        const RPC = "https://rpc.ankr.com/bsc";
        let history = [];

        async function init() {
            const provider = new ethers.providers.JsonRpcProvider(RPC);
            const oracle = new ethers.Contract(ORACLE_ADDR, ["function latestRoundData() view returns (uint80, int256, uint256, uint256, uint80)"], provider);
            
            new TradingView.widget({"autosize": true, "symbol": "BINANCE:BNBUSD", "interval": "5", "theme": "dark", "container_id": "tradingview_widget"});

            async function update() {
                try {
                    const data = await oracle.latestRoundData();
                    const price = parseFloat(ethers.utils.formatUnits(data[1], 8));
                    
                    document.getElementById('global-price').innerText = `$${price.toFixed(4)}`;
                    document.getElementById('status').innerText = "LIVE: CONNECTED TO BSC";
                    
                    history.push(price);
                    if(history.length > 20) history.shift();
                    runEngine(price);
                } catch(e) { document.getElementById('status').innerText = "CONNECTION ERROR - RETRYING..."; }
            }
            setInterval(update, 3000);
            update();
        }

        function runEngine(price) {
            if(history.length < 14) return;
            let gains = 0, losses = 0;
            for(let i=1; i<14; i++) {
                let diff = history[history.length-i] - history[history.length-i-1];
                if(diff > 0) gains += diff; else losses -= diff;
            }
            let rsi = 100 - (100 / (1 + (gains/losses)));
            
            const sig = document.getElementById('engine-signal');
            const res = document.getElementById('engine-reasoning');
            
            if(rsi > 70) { sig.innerText = "DOWN"; sig.className = "signal down"; res.innerText = "RSI Overbought: Expecting Reversion."; }
            else if(rsi < 30) { sig.innerText = "UP"; sig.className = "signal up"; res.innerText = "RSI Oversold: Bounce Likely."; }
            else { sig.innerText = "NEUTRAL"; sig.className = "signal"; res.innerText = "Market consolidating."; }
        }

        window.onload = init;
    </script>
</body>
</html>
