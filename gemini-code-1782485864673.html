<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PancakeSwap BNB Predictive Terminal v5.0 (Live Stream)</title>
    <style>
        :root {
            --bg-main: #020408;
            --panel-bg: rgba(10, 15, 26, 0.85);
            --panel-border: rgba(56, 189, 248, 0.2);
            --neon-cyan: #38bdf8;
            --neon-purple: #c084fc;
            --neon-green: #34d399;
            --neon-red: #fb7185;
            --neon-alert: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(56, 189, 248, 0.12), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(192, 132, 252, 0.05), transparent 45%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        /* Top Navigation & Controls */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tv-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tv-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Hero Focal Display Area */
