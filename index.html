<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PancakeSwap Pro: Auto-Win Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { 
            --bg: #1e1d2b; 
            --panel: #27262c; 
            --up: #31d0aa; 
            --down: #ed4b9e; 
            --text: #f4eeff; 
            --subtext: #8f90b0;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .chart-box { height: 400px; width: 100%; margin-bottom: 30px; border-radius: 16px; overflow: hidden; }
        .rounds-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { background: var(--panel); border-radius: 16px; width: 300px; padding: 0; display: flex; flex-direction: column; overflow: hidden; }
        .card-header { padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .expired { opacity: 0.7; }
        .expired .card-header { background: #353547; color: var(--subtext); }
        .live { border: 2px solid var(--text); }
        .live .card-header { background: #7645d9; color: white; }
        .next .card-header { background: #7645d9; color: white; }
        .prediction-badge { padding: 10px 40px; border-radius: 8px; font-size: 1.5rem; font-weight: bold; width: 100%; text-align: center; }
        .pred-up { background: var(--up); color: white; }
        .pred-down { background: var(--down); color: white; }
        .pred-waiting { background: #353547; color: var(--subtext); }
        .stat-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.9rem; }
        .progress-bg { background: #3b3a43; border-radius: 4px; height: 12px; width: 100%; overflow: hidden; }
        .progress-fill { background: #7645d9; height: 100%; width: 0%; transition: width 1s linear; }
    </style>
</head>
<body>
    <div class="container">
        <div id="tv-container" class="chart-box"></div>
        <div class="rounds-container">
            <div class="card expired">
                <div class="card-header"><span>Expired</span><span id="prev-epoch">#---</span></div>
                <div class="card-body">
                    <div style="font-size: 1.2rem; font-weight: bold; color: var(--subtext);">Result</div>
                    <div id="prev-result" class="prediction-badge pred-waiting">---</div>
                </div>
            </div>
            <div class="card live">
                <div class="card-header"><span>▶ LIVE</span><span id="live-epoch">#---</span></div>
                <div class="card-body" style="width: 100%;">
                    <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
                    <div id="time-left" style="font-weight: bold; font-size: 1.2rem;">--:--</div>
                </div>
            </div>
            <div class="card next">
                <div class="card-header"><span>▶ Next</span><span id="next-epoch">#---</span></div>
                <div class="card-body">
                    <div id="bot-prediction" class="prediction-badge pred-waiting">Waiting...</div>
                    <div class="stat-row"><span style="color: var(--subtext);">RSI:</span><span id="live-rsi">--</span></div>
                </div>
            </div>
        </div>
        <div class="ledger-box" style="background: var(--panel); padding: 20px; border-radius: 16px;">
            <h3>Bot Execution Ledger</h3>
            <div id="ledger" style="height: 150px; overflow-y: scroll; font-size: 0.85rem;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tggqamigkruvhoqkyxrq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HVa5hO_AyTxmsI_iIgrDBA_jSenZuSD';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const PREDICT_ADDR = "0x18B2A687610328590Bc8F2e5fEdDe3b582A49cdA";
        const ABI = ["function currentEpoch() view returns (uint256)", "function rounds(uint256) view returns (uint256 epoch, uint256 startTimestamp, uint256 lockTimestamp, uint256 closeTimestamp, int256 lockPrice, int256 closePrice, uint256 lockOracleId, uint256 closeOracleId, uint256 totalAmount, uint256 bullAmount, uint256 bearAmount, uint256 rewardBaseCalAmount, uint256 rewardAmount, bool oracleCalled)"];
        const RPC_URLS = ["https://bsc-rpc.publicnode.com", "https://bsc-dataseed1.binance.org"];

        let provider, contract, lastEpoch = 0, timerInterval;

        async function init() {
            new TradingView.widget({"container_id":"tv-container","symbol":"BINANCE:BNBUSD","interval":"5","theme":"dark","autosize":true,"studies":["RSI@tv-basicstudies"]});
            try {
                const fastest = await findFastestRPC();
                provider = fastest.provider; contract = fastest.contract;
                checkRound(); setInterval(checkRound, 5000);
            } catch (e) { console.error(e); }
        }

        async function findFastestRPC() {
            const promises = RPC_URLS.map(async (url) => {
                const p = new ethers.providers.JsonRpcProvider(url);
                const c = new ethers.Contract(PREDICT_ADDR, ABI, p);
                await c.currentEpoch(); 
                return { provider: p, contract: c };
            });
            return Promise.any(promises); 
        }

        async function checkRound() {
            try {
                const epoch = (await contract.currentEpoch()).toNumber();
                const liveRoundData = await contract.rounds(epoch);
                const lockTimestamp = liveRoundData.lockTimestamp.toNumber();
                
                document.getElementById('live-epoch').innerText = `#${epoch}`;
                document.getElementById('next-epoch').innerText = `#${epoch + 1}`;
                document.getElementById('prev-epoch').innerText = `#${epoch - 1}`;

                startTimer(lockTimestamp);

                // Golden Zone Logic
                const now = Math.floor(Date.now() / 1000);
                const secondsLeft = lockTimestamp - now;
                const predKey = `pred_${epoch + 1}`;

                if (!localStorage.getItem(predKey)) {
                    if (secondsLeft > 0 && secondsLeft <= 75) await generatePrediction(epoch + 1);
                    else {
                        document.getElementById('bot-prediction').innerText = "Waiting for 75s...";
                        document.getElementById('bot-prediction').className = "prediction-badge pred-waiting";
                    }
                } else {
                    displayPrediction(localStorage.getItem(predKey));
                }

                if (epoch > 1) {
                    const prevRound = await contract.rounds(epoch - 1);
                    if (prevRound.oracleCalled) {
                        const res = parseFloat(ethers.utils.formatUnits(prevRound.closePrice, 8)) > parseFloat(ethers.utils.formatUnits(prevRound.lockPrice, 8)) ? "UP" : "DOWN";
                        document.getElementById('prev-result').innerText = res;
                        document.getElementById('prev-result').className = `prediction-badge ${res === 'UP' ? 'pred-up' : 'pred-down'}`;
                    }
                }

                if (epoch > lastEpoch && lastEpoch !== 0) verifyResult(lastEpoch - 1);
                lastEpoch = epoch;
            } catch(e) { console.error(e); }
        }

        async function generatePrediction(targetEpoch) {
            try {
                const res = await fetch("https://api.binance.us/api/v3/klines?symbol=BNBUSDT&interval=5m&limit=15");
                const candles = await res.json();
                let closes = candles.map(c => parseFloat(c[4]));
                let gains = 0, losses = 0;
                for(let i = 1; i < closes.length; i++) {
                    let diff = closes[i] - closes[i-1];
                    if (diff > 0) gains += diff; else losses += Math.abs(diff);
                }
                const rsi = 100 - (100 / (1 + (gains/14) / (losses/14)));
                document.getElementById('live-rsi').innerText = rsi.toFixed(2);
                let prediction = (rsi > 65) ? "DOWN" : ((rsi < 35) ? "UP" : (closes[14] > closes[12] ? "UP" : "DOWN"));
                localStorage.setItem(`pred_${targetEpoch}`, prediction);
                displayPrediction(prediction);
            } catch (e) { console.error(e); }
        }

        function displayPrediction(p) {
            const el = document.getElementById('bot-prediction');
            el.innerText = `ENTER ${p}`;
            el.className = `prediction-badge ${p === 'UP' ? 'pred-up' : 'pred-down'}`;
        }

        function startTimer(lockTimestamp) {
            const now = Math.floor(Date.now() / 1000);
            const secondsLeft = lockTimestamp - now;
            const bar = document.getElementById('progress-bar');
            document.getElementById('time-left').innerText = secondsLeft > 0 ? `${Math.floor(secondsLeft/60)}:${(secondsLeft%60).toString().padStart(2,'0')}` : "00:00";
            bar.style.width = `${Math.max(0, Math.min(100, ((300 - secondsLeft) / 300) * 100))}%`;
        }

        async function verifyResult(epoch) {
            try {
                const round = await contract.rounds(epoch);
                if (!round.oracleCalled) return;
                const actual = parseFloat(ethers.utils.formatUnits(round.closePrice, 8)) > parseFloat(ethers.utils.formatUnits(round.lockPrice, 8)) ? "UP" : "DOWN";
                const pred = localStorage.getItem(`pred_${epoch}`);
                if (pred) {
                    await supabaseClient.from('prediction_logs').insert([{ epoch_id: epoch, predicted_side: pred, result: (pred === actual ? "WIN" : "LOSS") }]);
                    const ledger = document.getElementById('ledger');
                    ledger.innerHTML = `<div style="border-bottom: 1px solid #353547; padding: 5px;">Epoch ${epoch}: Pred ${pred} | Actual ${actual} | <b>${pred===actual?"WIN":"LOSS"}</b></div>` + ledger.innerHTML;
                }
            } catch(e) {}
        }
        window.onload = init;
    </script>
</body>
</html>
