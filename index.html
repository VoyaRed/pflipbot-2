<script>
        // --- THEME TOGGLE LOGIC ---
        const themeBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('cakeTheme') || 'light';
        
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeBtn.innerText = '☀️ Strawberry Vanilla';
        }

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('cakeTheme', isDark ? 'dark' : 'light');
            themeBtn.innerText = isDark ? '☀️ Strawberry Vanilla' : '🌙 Dark Chocolate';
            initTradingView();
        });

        function initTradingView() {
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('tv-container').innerHTML = ''; 
            new TradingView.widget({ 
                "container_id": "tv-container", 
                "symbol": "BINANCE:BNBUSD", 
                "interval": "5", 
                "theme": isDark ? "dark" : "light", 
                "autosize": true, 
                "studies": ["RSI@tv-basicstudies", "MACD@tv-basicstudies"] 
            });
        }

        // --- DASHBOARD DATA SYNC LOGIC ---
        const SUPABASE_URL = 'https://tggqamigkruvhoqkyxrq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HVa5hO_AyTxmsI_iIgrDBA_jSenZuSD';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PREDICT_ADDR = "0x18B2A687610328590Bc8F2e5fEdDe3b582A49cdA";
        const ABI = [
            "function currentEpoch() view returns (uint256)", 
            "function rounds(uint256) view returns (uint256 epoch, uint256 startTimestamp, uint256 lockTimestamp, uint256 closeTimestamp, int256 lockPrice, int256 closePrice, uint256 lockOracleId, uint256 closeOracleId, uint256 totalAmount, uint256 bullAmount, uint256 bearAmount, uint256 rewardBaseCalAmount, uint256 rewardAmount, bool oracleCalled)"
        ];
        
        const CHAINLINK_BNB_USD = "0x0567F2323251f0Aab15c8dFb1967E4e8A7D42aeE";
        const CHAINLINK_ABI = ["function latestRoundData() external view returns (uint80 roundId, int256 answer, uint256 startedAt, uint256 updatedAt, uint80 answeredInRound)"];

        let provider, contract, oracleContract, timerInterval;
        let lastLockedPrice = 0;
        let notifiedEpochs = new Set();

        async function init() {
            initTradingView(); 
            try {
                const nodes = [
                    "https://bsc-rpc.publicnode.com",
                    "https://binance.llamarpc.com",
                    "https://bsc-dataseed.binance.org"
                ];
                
                // Connect to Blockchain
                for (let url of nodes) {
                    try {
                        provider = new ethers.providers.JsonRpcProvider(url);
                        contract = new ethers.Contract(PREDICT_ADDR, ABI, provider);
                        await contract.currentEpoch(); 
                        break;
                    } catch (e) { }
                }

                oracleContract = new ethers.Contract(CHAINLINK_BNB_USD, CHAINLINK_ABI, provider);
                setInterval(fetchOraclePrice, 3000);
                fetchOraclePrice(); 
                
                runSyncLoop();
            } catch (error) { 
                console.error("Initialization failed, retrying in 5s...");
                setTimeout(init, 5000); 
            }
        }

        async function fetchOraclePrice() {
            if (!oracleContract) return;
            try {
                const data = await oracleContract.latestRoundData();
                const price = (data.answer / 1e8); 
                const el = document.getElementById('live-last-price');
                if (el) {
                    el.innerText = '$' + price.toFixed(4);
                    if (lastLockedPrice > 0) {
                        el.className = price >= lastLockedPrice ? 'main-price up' : 'main-price down';
                    }
                }
            } catch (error) {}
        }

        async function updateMarketVisuals() {
            // Frontend calculates its own RSI/MACD via proxy for the UI
            const endpoints = [
                "https://api.binance.com/api/v3/klines?symbol=BNBUSDT&interval=5m&limit=100",
                "https://corsproxy.io/?" + encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=BNBUSDT&interval=5m&limit=100")
            ];

            let candles;
            for (let url of endpoints) {
                try {
                    const res = await fetch(url);
                    if (res.ok) { candles = await res.json(); break; }
                } catch (e) {}
            }
            if (!candles) return;

            const closes = candles.map(c => parseFloat(c[4]));
            
            // Calc RSI
            let gains = 0, losses = 0;
            for(let i = closes.length - 14; i < closes.length; i++) {
                const diff = closes[i] - closes[i-1];
                if (diff > 0) gains += diff; else losses += Math.abs(diff);
            }
            const avgGain = gains / 14; const avgLoss = losses / 14;
            let rsi = 100;
            if (avgLoss !== 0) { rsi = 100 - (100 / (1 + (avgGain / avgLoss))); }
            document.getElementById('live-rsi').innerText = rsi.toFixed(2);

            // Calc MACD
            const calculateEMAArray = (data, period) => {
                const k = 2 / (period + 1); let emaArray = [data[0]];
                for (let i = 1; i < data.length; i++) emaArray.push((data[i] * k) + (emaArray[i - 1] * (1 - k)));
                return emaArray;
            };
            const ema12Array = calculateEMAArray(closes, 12);
            const ema26Array = calculateEMAArray(closes, 26);
            const macdLineArray = ema12Array.map((v, i) => v - ema26Array[i]);
            const signalLineArray = calculateEMAArray(macdLineArray, 9);
            const currentHist = macdLineArray[macdLineArray.length - 1] - signalLineArray[signalLineArray.length - 1];
            
            let macdColor = currentHist >= 0 ? "var(--up)" : "var(--down)";
            document.getElementById('live-macd').innerHTML = `<span style="color: ${macdColor}">${currentHist.toFixed(3)}</span>`;
        }

        async function runSyncLoop() {
            try {
                const currentEpoch = (await contract.currentEpoch()).toNumber();
                const liveEpoch = currentEpoch > 0 ? currentEpoch - 1 : 0;
                const prevEpoch = currentEpoch > 1 ? currentEpoch - 2 : 0;

                // 1. Update UI Headers & Live Ethers Data
                document.getElementById("next-epoch").innerText = `#${currentEpoch}`;
                if (liveEpoch > 0) document.getElementById("live-epoch").innerText = `#${liveEpoch}`;
                if (prevEpoch > 0) document.getElementById("prev-epoch").innerText = `#${prevEpoch}`;

                const nextRoundData = await contract.rounds(currentEpoch);
                document.getElementById('next-prize-pool').innerText = `${parseFloat(ethers.utils.formatUnits(nextRoundData.totalAmount, 18)).toFixed(4)} BNB`;

                if (liveEpoch > 0) {
                    const liveRound = await contract.rounds(liveEpoch);
                    const lockPrice = parseFloat(ethers.utils.formatUnits(liveRound.lockPrice, 8)).toFixed(4);
                    lastLockedPrice = parseFloat(lockPrice); 
                    
                    document.getElementById('live-lock-price').innerText = `$${lockPrice}`;
                    document.getElementById('live-prize-pool').innerText = `${parseFloat(ethers.utils.formatUnits(liveRound.totalAmount, 18)).toFixed(4)} BNB`;
                    startTimer(liveRound.closeTimestamp.toNumber());
                }

                if (prevEpoch > 0) {
                    const prevRound = await contract.rounds(prevEpoch);
                    if (prevRound.oracleCalled) {
                        const lockPrice = parseFloat(ethers.utils.formatUnits(prevRound.lockPrice, 8));
                        const closePrice = parseFloat(ethers.utils.formatUnits(prevRound.closePrice, 8));
                        
                        document.getElementById('prev-lock-price').innerText = `$${lockPrice.toFixed(4)}`;
                        const closeEl = document.getElementById('prev-close-price');
                        closeEl.innerText = `$${closePrice.toFixed(4)}`;
                        closeEl.className = `main-price ${closePrice >= lockPrice ? 'up' : 'down'}`;
                    }
                }

                // 2. Refresh Visual Indicators
                await updateMarketVisuals();

                // 3. Sync with Bot Mind (Supabase)
                const { data } = await supabaseClient.from('prediction_logs')
                    .select('*').order('epoch_id', { ascending: false }).limit(20);

                if (data) renderDashboardFromDB(data, currentEpoch, liveEpoch, prevEpoch);

            } catch (error) { console.warn("Sync Error:", error); }
            
            setTimeout(runSyncLoop, 10000); 
        }

        function renderDashboardFromDB(logs, nextEpoch, liveEpoch, prevEpoch) {
            document.getElementById('ledger').innerHTML = ''; // Clear ledger for redraw
            
            let hasPendingNext = false;

            logs.forEach(log => {
                const sideCls = log.predicted_side === 'UP' ? 'pred-up' : (log.predicted_side === 'DOWN' ? 'pred-down' : 'pred-waiting');
                const isSkip = log.predicted_side.includes('SKIP');

                // --- NEXT CARD ---
                if (log.epoch_id === nextEpoch) {
                    hasPendingNext = true;
                    const el = document.getElementById('bot-prediction');
                    el.innerText = isSkip ? "SKIP" : log.predicted_side; 
                    el.className = `prediction-badge ${sideCls}`;
                    document.getElementById('next-conf').innerText = log.confidence;
                }

                // --- LIVE CARD ---
                if (log.epoch_id === liveEpoch) {
                    const el = document.getElementById('live-bet');
                    el.innerText = isSkip ? "SKIP" : log.predicted_side; 
                    el.className = `prediction-badge ${sideCls}`;
                    document.getElementById('live-conf').innerText = log.confidence;
                }

                // --- PREV CARD ---
                if (log.epoch_id === prevEpoch) {
                    const el = document.getElementById('prev-bet');
                    el.innerText = isSkip ? "SKIP" : log.predicted_side; 
                    el.className = `prediction-badge ${sideCls}`;
                    document.getElementById('prev-conf').innerText = log.confidence;
                    
                    const resEl = document.getElementById('prev-result');
                    resEl.innerText = log.result;
                    if (log.result === 'WIN') resEl.className = 'prediction-badge pred-up';
                    else if (log.result === 'LOSS') resEl.className = 'prediction-badge pred-down';
                    else resEl.className = 'prediction-badge pred-waiting';
                }

                // --- LEDGER & FX ---
                if (log.result !== 'PENDING') {
                    renderLedgerRow(log.epoch_id, log.predicted_side, log.result, log.confidence);
                    
                    if (!notifiedEpochs.has(log.epoch_id)) {
                        if (log.result === 'WIN') triggerWinEffect();
                        if (log.result === 'LOSS') { document.body.classList.add('loss-shake'); setTimeout(() => document.body.classList.remove('loss-shake'), 1000); }
                        notifiedEpochs.add(log.epoch_id);
                    }
                }
            });

            // If bot hasn't pushed a prediction yet, show Waiting
            if (!hasPendingNext) {
                document.getElementById('bot-prediction').innerText = "Waiting for 75s";
                document.getElementById('bot-prediction').className = "prediction-badge pred-waiting";
                document.getElementById('next-conf').innerText = "Analyzing...";
            }
        }

        function renderLedgerRow(epoch, predicted, result, confidence) {
            const ledger = document.getElementById('ledger');
            let resColor = result === "WIN" ? "var(--up)" : (result === "LOSS" ? "var(--down)" : "var(--subtext)");
            let predColor = predicted === "UP" ? "var(--up)" : (predicted === "DOWN" ? "var(--down)" : "var(--subtext)");
            
            ledger.innerHTML += `
            <div class="ledger-item">
                <div><strong>Epoch #${epoch}</strong> <span class="confidence-tag" style="margin-left: 10px;">${confidence}</span></div>
                <div>Bot: <span style="color: ${predColor}; font-weight: bold;">${predicted}</span> &nbsp;→&nbsp; <span style="color: ${resColor}; font-weight: 800;">${result}</span></div>
            </div>`;
        }

        function startTimer(targetTimestamp) {
            clearInterval(timerInterval);
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('time-left');

            timerInterval = setInterval(() => {
                const secondsLeft = targetTimestamp - Math.floor(Date.now() / 1000);
                if (secondsLeft <= 0) { text.innerText = "00:00"; bar.style.width = "100%"; clearInterval(timerInterval); } 
                else {
                    text.innerText = `${Math.floor(secondsLeft / 60).toString().padStart(2, '0')}:${(secondsLeft % 60).toString().padStart(2, '0')}`;
                    bar.style.width = `${Math.max(0, Math.min(100, ((300 - secondsLeft) / 300) * 100))}%`;
                }
            }, 1000);
        }

        function triggerWinEffect() {
            var duration = 3 * 1000; var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * (0.3 - 0.1) + 0.1, y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * (0.9 - 0.7) + 0.7, y: Math.random() - 0.2 } }));
            }, 250);
        }

        window.onload = init;
    </script>
