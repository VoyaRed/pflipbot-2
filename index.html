<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PancakeSwap Pro: Auto-Win Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { 
            --bg: #1e1d2b; 
            --panel: #27262c; 
            --up: #31d0aa; 
            --down: #ed4b9e; 
            --text: #f4eeff; 
            --subtext: #8f90b0;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .chart-box { height: 400px; width: 100%; margin-bottom: 30px; border-radius: 16px; overflow: hidden; }
        
        .rounds-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        
        .card { 
            background: var(--panel); 
            border-radius: 16px; 
            width: 300px; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0px 2px 12px -8px rgba(25, 19, 38, 0.1), 0px 1px 1px rgba(25, 19, 38, 0.05);
        }
        
        .card-header { padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .expired { opacity: 0.7; }
        .expired .card-header { background: #353547; color: var(--subtext); }
        .live { border: 2px solid var(--text); }
        .live .card-header { background: #7645d9; color: white; }
        .next .card-header { background: #7645d9; color: white; }
        
        .prediction-badge { padding: 10px 40px; border-radius: 8px; font-size: 1.5rem; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box; }
        .pred-up { background: var(--up); color: white; }
        .pred-down { background: var(--down); color: white; }
        .pred-waiting { background: #353547; color: var(--subtext); }

        .stat-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.9rem; margin-bottom: 5px; }
        
        .progress-bg { background: #3b3a43; border-radius: 4px; height: 12px; width: 100%; overflow: hidden; }
        .progress-fill { background: #7645d9; height: 100%; width: 0%; transition: width 1s linear; }
        
        .ledger-box { background: var(--panel); padding: 20px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="tv-container" class="chart-box"></div>
        
        <div class="rounds-container">
            
            <!-- Expired Card -->
            <div class="card expired">
                <div class="card-header">
                    <span>Expired</span>
                    <span id="prev-epoch">#---</span>
                </div>
                <div class="card-body">
                    <div style="font-size: 1rem; font-weight: bold;">Bot Bet</div>
                    <div id="prev-bet" class="prediction-badge pred-waiting">---</div>
                    
                    <div style="font-size: 1rem; font-weight: bold; color: var(--subtext); margin-top: 10px;">Actual Result</div>
                    <div id="prev-result" class="prediction-badge pred-waiting">---</div>
                </div>
            </div>

            <!-- Live Card -->
            <div class="card live">
                <div class="card-header">
                    <span>▶ LIVE (Locking In)</span>
                    <span id="live-epoch">#---</span>
                </div>
                <div class="card-body" style="width: 100%; box-sizing: border-box;">
                    <div style="font-size: 1rem; font-weight: bold;">Bot Bet</div>
                    <div id="live-bet" class="prediction-badge pred-waiting">---</div>

                    <div style="text-align: center; margin-top: 10px;">Time Remaining:</div>
                    <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
                    <div id="time-left" style="text-align: center; font-weight: bold; margin-top: 5px; font-size: 1.2rem;">--:--</div>
                </div>
            </div>

            <!-- Next Card -->
            <div class="card next">
                <div class="card-header">
                    <span>▶ Next</span>
                    <span id="next-epoch">#---</span>
                </div>
                <div class="card-body">
                    <div style="font-size: 1rem; font-weight: bold;">Bot Target</div>
                    <div id="bot-prediction" class="prediction-badge pred-waiting">Calculating...</div>
                    <div class="stat-row" style="margin-top: 10px;">
                        <span style="color: var(--subtext);">Current RSI:</span>
                        <span id="live-rsi" style="font-weight: bold;">--</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="ledger-box">
            <h3>Bot Execution Ledger</h3>
            <div id="ledger" style="height: 150px; overflow-y: scroll; font-size: 0.85rem;"></div>
        </div>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://tggqamigkruvhoqkyxrq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HVa5hO_AyTxmsI_iIgrDBA_jSenZuSD';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PREDICT_ADDR = "0x18B2A687610328590Bc8F2e5fEdDe3b582A49cdA";
        const ABI = [
            "function currentEpoch() view returns (uint256)", 
            "function rounds(uint256) view returns (uint256 epoch, uint256 startTimestamp, uint256 lockTimestamp, uint256 closeTimestamp, int256 lockPrice, int256 closePrice, uint256 lockOracleId, uint256 closeOracleId, uint256 totalAmount, uint256 bullAmount, uint256 bearAmount, uint256 rewardBaseCalAmount, uint256 rewardAmount, bool oracleCalled)"
        ];
        
        const RPC_URLS = ["https://bsc-rpc.publicnode.com", "https://bsc-dataseed1.binance.org"];

        let provider, contract, lastEpoch = 0, timerInterval;

        async function init() {
            new TradingView.widget({
                "container_id": "tv-container",
                "symbol": "BINANCE:BNBUSD",
                "interval": "5",
                "theme": "dark",
                "autosize": true,
                "studies": ["RSI@tv-basicstudies"]
            });
            
            try {
                const fastest = await findFastestRPC();
                provider = fastest.provider;
                contract = fastest.contract;
            } catch (error) { return; }

            await checkRound();
            setInterval(checkRound, 5000);
        }

        async function findFastestRPC() {
            const promises = RPC_URLS.map(async (url) => {
                const p = new ethers.providers.JsonRpcProvider(url);
                const c = new ethers.Contract(PREDICT_ADDR, ABI, p);
                await c.currentEpoch(); 
                return { provider: p, contract: c };
            });
            return Promise.any(promises); 
        }

        async function checkRound() {
            try {
                const epoch = (await contract.currentEpoch()).toNumber();
                const liveRoundData = await contract.rounds(epoch);
                const lockTimestamp = liveRoundData.lockTimestamp.toNumber();
                
                // 1. Update UI Headers (Using epoch - 2 for Expired to get the finalized round)
                const expiredEpoch = epoch > 1 ? epoch - 2 : 0;
                
                document.getElementById('live-epoch').innerText = `#${epoch}`;
                document.getElementById('next-epoch').innerText = `#${epoch + 1}`;
                if (expiredEpoch > 0) document.getElementById('prev-epoch').innerText = `#${expiredEpoch}`;

                // 2. Handle Timer Progress Bar
                startTimer(lockTimestamp);

                // 3. Update LIVE Card Bot Bet
                const currentLiveBet = localStorage.getItem(`pred_${epoch}`);
                const liveBetEl = document.getElementById('live-bet');
                if (currentLiveBet) {
                    liveBetEl.innerText = currentLiveBet;
                    liveBetEl.className = `prediction-badge ${currentLiveBet === 'UP' ? 'pred-up' : 'pred-down'}`;
                } else {
                    liveBetEl.innerText = "No Bet Found";
                    liveBetEl.className = "prediction-badge pred-waiting";
                }

                // 4. The "Golden Zone" Prediction Logic (Predict at 75s mark for NEXT epoch)
                const now = Math.floor(Date.now() / 1000);
                const secondsLeft = lockTimestamp - now;
                const predKey = `pred_${epoch + 1}`;

                if (!localStorage.getItem(predKey)) {
                    if (secondsLeft > 0 && secondsLeft <= 75) {
                        await generatePrediction(epoch + 1);
                    } else {
                        document.getElementById('bot-prediction').innerText = "Waiting for 75s...";
                        document.getElementById('bot-prediction').className = "prediction-badge pred-waiting";
                    }
                } else {
                    displayPrediction(localStorage.getItem(predKey));
                }

                // 5. Handle Expired Round Data (epoch - 2)
                if (expiredEpoch > 0) {
                    const expiredRound = await contract.rounds(expiredEpoch);
                    
                    // Fetch and show Bot's Expired Bet
                    const expiredBet = localStorage.getItem(`pred_${expiredEpoch}`);
                    const prevBetEl = document.getElementById('prev-bet');
                    if (expiredBet) {
                        prevBetEl.innerText = expiredBet;
                        prevBetEl.className = `prediction-badge ${expiredBet === 'UP' ? 'pred-up' : 'pred-down'}`;
                    } else {
                        prevBetEl.innerText = "No Bet";
                        prevBetEl.className = "prediction-badge pred-waiting";
                    }

                    // Show Actual Result
                    const prevResultEl = document.getElementById('prev-result');
                    if (expiredRound.oracleCalled) {
                        const lockPrice = parseFloat(ethers.utils.formatUnits(expiredRound.lockPrice, 8));
                        const closePrice = parseFloat(ethers.utils.formatUnits(expiredRound.closePrice, 8));
                        const actualResult = closePrice > lockPrice ? "UP" : "DOWN";
                        
                        prevResultEl.innerText = actualResult;
                        prevResultEl.className = `prediction-badge ${actualResult === 'UP' ? 'pred-up' : 'pred-down'}`;
                    } else {
                        prevResultEl.innerText = "Resolving...";
                        prevResultEl.className = "prediction-badge pred-waiting";
                    }
                }

                // 6. Verify Previous Results for Ledger
                if (epoch > lastEpoch && lastEpoch !== 0) {
                    verifyResult(lastEpoch - 1); 
                }
                lastEpoch = epoch;
                
            } catch(e) { 
                console.error("CheckRound Error:", e); 
            }
        }

        async function generatePrediction(targetEpoch) {
            try {
                document.getElementById('bot-prediction').innerText = "Analyzing...";
                
                const res = await fetch("https://api.binance.us/api/v3/klines?symbol=BNBUSDT&interval=5m&limit=15");
                const candles = await res.json();
                
                let closes = candles.map(c => parseFloat(c[4]));
                let gains = 0, losses = 0;
                
                for(let i = 1; i < closes.length; i++) {
                    const diff = closes[i] - closes[i-1];
                    if (diff > 0) gains += diff;
                    else losses += Math.abs(diff);
                }
                
                const avgGain = gains / 14;
                const avgLoss = losses / 14;
                const rs = avgGain / avgLoss;
                const rsi = 100 - (100 / (1 + rs));
                
                document.getElementById('live-rsi').innerText = rsi.toFixed(2);

                let prediction = "UP";
                if (rsi > 65) prediction = "DOWN"; 
                else if (rsi < 35) prediction = "UP"; 
                else {
                    const recentMomentum = closes[14] - closes[12]; 
                    prediction = recentMomentum > 0 ? "UP" : "DOWN";
                }

                localStorage.setItem(`pred_${targetEpoch}`, prediction);
                displayPrediction(prediction);
            } catch (e) {
                console.error("Brain Failed:", e);
            }
        }

        function displayPrediction(prediction) {
            const predEl = document.getElementById('bot-prediction');
            predEl.innerText = `ENTER ${prediction}`;
            predEl.className = `prediction-badge ${prediction === 'UP' ? 'pred-up' : 'pred-down'}`;
        }

        function startTimer(lockTimestamp) {
            clearInterval(timerInterval);
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('time-left');

            timerInterval = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const secondsLeft = lockTimestamp - now;
                const total = 300; 

                if (secondsLeft <= 0) {
                    text.innerText = "00:00";
                    bar.style.width = "100%";
                    clearInterval(timerInterval);
                } else {
                    const mins = Math.floor(secondsLeft / 60);
                    const secs = secondsLeft % 60;
                    text.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    bar.style.width = `${Math.max(0, Math.min(100, ((total - secondsLeft) / total) * 100))}%`;
                }
            }, 1000);
        }

        async function verifyResult(epochToCheck) {
            try {
                if (epochToCheck <= 0) return;
                const round = await contract.rounds(epochToCheck);
                if (!round.oracleCalled) return; 

                const lockPrice = parseFloat(ethers.utils.formatUnits(round.lockPrice, 8));
                const closePrice = parseFloat(ethers.utils.formatUnits(round.closePrice, 8));
                const actualResult = closePrice > lockPrice ? "UP" : "DOWN";
                const botPrediction = localStorage.getItem(`pred_${epochToCheck}`);
                
                if (botPrediction) {
                    const isWin = (botPrediction === actualResult) ? "WIN" : "LOSS";
                    await supabaseClient.from('prediction_logs').insert([{ 
                        epoch_id: epochToCheck, predicted_side: botPrediction, result: isWin 
                    }]);
                    renderLedger(epochToCheck, botPrediction, actualResult, isWin);
                }
            } catch(e) {}
        }

        function renderLedger(epoch, predicted, actual, result) {
            const ledger = document.getElementById('ledger');
            const color = result === "WIN" ? "var(--up)" : "var(--down)";
            if (ledger.innerHTML.includes(`Epoch ${epoch}`)) return;

            ledger.innerHTML = `<div style="margin-bottom: 5px; border-bottom: 1px solid #353547; padding-bottom: 5px;">
                <strong>Epoch ${epoch}</strong> — Pred: <span style="color: ${predicted==='UP'?'var(--up)':'var(--down)'}">${predicted}</span> 
                | Actual: ${actual} | <span style="color: ${color}; font-weight: bold;">${result}</span>
            </div>` + ledger.innerHTML;
        }

        window.onload = init;
    </script>
</body>
</html>
