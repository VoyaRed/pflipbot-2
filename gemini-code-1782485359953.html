<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PancakeSwap BNB Predictive Terminal v4.0 (Strict Mode)</title>
    <style>
        :root {
            --bg-main: #020408;
            --panel-bg: rgba(10, 15, 26, 0.75);
            --panel-border: rgba(56, 189, 248, 0.15);
            --neon-cyan: #38bdf8;
            --neon-purple: #c084fc;
            --neon-green: #34d399;
            --neon-red: #fb7185;
            --neon-alert: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(56, 189, 248, 0.12), transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(192, 132, 252, 0.05), transparent 45%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .focal-terminal {
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 24px;
            padding: 40px 24px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(20px);
        }

        .focal-terminal.error-state {
            border-color: var(--neon-alert);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
        }

        .focal-terminal::after {
            content: 'LIVE ALGORITHMIC ORACLE ENGINE';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #020408;
            padding: 2px 14px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            border-radius: 20px;
        }

        .focal-terminal.error-state::after {
            color: var(--neon-alert);
            border-color: var(--neon-alert);
            content: 'SYSTEM HALTED - NO DATA';
        }

        .prediction-badge {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 15px 0;
            text-transform: uppercase;
            filter: drop-shadow(0 0 25px currentColor);
        }

        .dir-up { color: var(--neon-green); }
        .dir-down { color: var(--neon-red); }
        .dir-error { color: var(--neon-alert); font-size: 3.5rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .glass-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(16px);
        }

        .glass-card h2 {
            margin: 0 0 20px 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-row:last-child { border: none; }
        .data-label { color: var(--text-muted); font-size: 0.9rem; }
        .data-value { font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; }

        .gauge-area { margin-top: 20px; }
        .gauge-track {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            overflow: hidden;
            display: flex;
        }
        .gauge-fill-up { background: var(--neon-green); transition: width 0.4s ease; }
        .gauge-fill-down { background: var(--neon-red); transition: width 0.4s ease; }

        .ledger-box {
            overflow-y: auto;
            max-height: 290px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ledger-entry {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .pill-win { background: rgba(52, 211, 153, 0.1); color: var(--neon-green); border: 1px solid rgba(52, 211, 153, 0.2); }
        .pill-loss { background: rgba(251, 113, 133, 0.1); color: var(--neon-red); border: 1px solid rgba(251, 113, 133, 0.2); }
        
        .system-status { font-size: 0.8rem; font-family: var(--font-mono); margin-bottom: 12px; padding: 6px 12px; border-radius: 6px; display: inline-block; }
        .status-live { background: rgba(52, 211, 153, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--neon-alert); border: 1px solid var(--neon-alert); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-terminal" class="focal-terminal">
        <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted);">
            Active Pool Prediction Direction
        </div>
        <div id="hero-signal" class="prediction-badge dir-up">WAITING FOR LIVE DATA</div>
        
        <div style="display: flex; justify-content: center; gap: 60px; margin-top: 20px;">
            <div>
                <span style="color: var(--text-muted); font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;">Win Rate</span>
                <div id="stat-accuracy" style="font-size: 1.8rem; font-weight: 800; font-family: var(--font-mono); color: var(--neon-purple);">--.--%</div>
            </div>
            <div>
                <span style="color: var(--text-muted); font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;">Round Countdown</span>
                <div id="stat-timer" style="font-size: 1.8rem; font-weight: 800; font-family: var(--font-mono); color: var(--neon-cyan);">05:00</div>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="glass-card">
            <h2>Real-Time Model Analysis</h2>
            
            <div id="api-indicator" class="system-status status-error">CONNECTING TO BINANCE...</div>

            <div class="data-row">
                <span class="data-label">Live Oracle Spot Price</span>
                <span id="row-live-price" class="data-value">NO DATA</span>
            </div>
            <div class="data-row">
                <span class="data-label">Interval Opening Lock Price</span>
                <span id="row-lock-price" class="data-value">NO DATA</span>
            </div>
            <div class="data-row">
                <span class="data-label">RSI Target Windows (14)</span>
                <span id="row-rsi" class="data-value">NO DATA</span>
            </div>

            <div class="gauge-area">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; font-weight: 600;">
                    <span style="color: var(--neon-green)">UP Bias: <span id="text-bias-up">--%</span></span>
                    <span style="color: var(--neon-red)">DOWN Bias: <span id="text-bias-down">--%</span></span>
                </div>
                <div class="gauge-track">
                    <div id="fill-up" class="gauge-fill-up" style="width: 0%;"></div>
                    <div id="fill-down" class="gauge-fill-down" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h2>Algorithmic Round Ledger</h2>
            <div id="ledger-viewport" class="ledger-box">
                </div>
        </div>
    </div>
</div>

<script>
    // STRICT NO-FAKE-DATA POLICY ENFORCED: 
    // No simulated or fallback data will ever be generated in this script.
    // If the API drops, the app halts and displays an error until a real connection is made.

    const CONFIG = {
        symbol: 'BNBUSDT',
        rsiPeriod: 14,
        oversoldThreshold: 30,
        overboughtThreshold: 70,
        // Standard Binance API wrapped in a CORS proxy. 
        baseProxyUrl: 'https://corsproxy.io/?url=',
        targetApi: 'https://api.binance.com/api/v3/klines'
    };

    let livePrice = 0;
    let baselineLockPrice = 0;
    let trackingRsi = 0;
    let computedSignal = "NONE";
    let workingEpochId = 0;
    let isConnected = false;

    let executionLedger = JSON.parse(localStorage.getItem('terminal_ledger_v4')) || [];

    function calculateWildersRsi(closes) {
        if (closes.length < CONFIG.rsiPeriod + 1) return 0;
        let gains = [], losses = [];
        for (let i = 1; i < closes.length; i++) {
            let difference = closes[i] - closes[i - 1];
            gains.push(difference >= 0 ? difference : 0);
            losses.push(difference < 0 ? Math.abs(difference) : 0);
        }
        let averageGain = gains.slice(0, CONFIG.rsiPeriod).reduce((a, b) => a + b, 0) / CONFIG.rsiPeriod;
        let averageLoss = losses.slice(0, CONFIG.rsiPeriod).reduce((a, b) => a + b, 0) / CONFIG.rsiPeriod;
        
        for (let i = CONFIG.rsiPeriod; i < gains.length; i++) {
            averageGain = (averageGain * (CONFIG.rsiPeriod - 1) + gains[i]) / CONFIG.rsiPeriod;
            averageLoss = (averageLoss * (CONFIG.rsiPeriod - 1) + losses[i]) / CONFIG.rsiPeriod;
        }
        return averageLoss === 0 ? 100 : 100 - (100 / (1 + (averageGain / averageLoss)));
    }

    async function streamMarketMetrics() {
        try {
            const fullQueryUrl = `${CONFIG.baseProxyUrl}${encodeURIComponent(CONFIG.targetApi + '?symbol=' + CONFIG.symbol + '&interval=5m&limit=40')}`;
            const response = await fetch(fullQueryUrl);
            
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            
            const marketMatrix = await response.json();
            if (!Array.isArray(marketMatrix) || marketMatrix.length === 0) throw new Error("API returned empty data payload.");

            const closePricesArray = marketMatrix.map(candle => parseFloat(candle[4]));
            
            // STRICT MAPPING TO REAL WORLD DATA ONLY
            livePrice = closePricesArray[closePricesArray.length - 1];
            baselineLockPrice = parseFloat(marketMatrix[marketMatrix.length - 1][1]);
            trackingRsi = calculateWildersRsi(closePricesArray);
            isConnected = true;

            const indicator = document.getElementById('api-indicator');
            indicator.innerText = "NETWORK ORACLE CONNECTION: ACTIVE (LIVE DATA)";
            indicator.className = "system-status status-live";
            
            document.getElementById('main-terminal').classList.remove('error-state');

            renderActiveDisplayInterface();
        } catch (error) {
            isConnected = false;
            triggerHardErrorState(error.message);
        }
    }

    // Explicit Hard Error State - Zero data simulation allowed
    function triggerHardErrorState(errorMessage) {
        console.error("Strict Mode API Blocked:", errorMessage);
        
        const indicator = document.getElementById('api-indicator');
        indicator.innerText = `API ERROR: DATA UNAVAILABLE`;
        indicator.className = "system-status status-error";

        const heroBadge = document.getElementById('hero-signal');
        heroBadge.innerText = "API CONNECTION FAILED";
        heroBadge.className = "prediction-badge dir-error";

        document.getElementById('main-terminal').classList.add('error-state');

        // Wipe UI of any residual calculations
        document.getElementById('fill-up').style.width = `0%`;
        document.getElementById('fill-down').style.width = `0%`;
        document.getElementById('text-bias-up').innerText = `--%`;
        document.getElementById('text-bias-down').innerText = `--%`;
        
        document.getElementById('row-live-price').innerText = `NO DATA`;
        document.getElementById('row-lock-price').innerText = `NO DATA`;
        document.getElementById('row-rsi').innerText = `NO DATA`;
    }

    function renderActiveDisplayInterface() {
        if (!isConnected || livePrice === 0) return;

        let percentageUpBias = 50;

        if (trackingRsi <= CONFIG.oversoldThreshold) {
            percentageUpBias = 70 + (CONFIG.oversoldThreshold - trackingRsi);
        } else if (trackingRsi >= CONFIG.overboughtThreshold) {
            percentageUpBias = 30 - (trackingRsi - CONFIG.overboughtThreshold);
        } else {
            let structuralDelta = livePrice - baselineLockPrice;
            percentageUpBias = 50 + (structuralDelta * 1.2) + ((trackingRsi - 50) * 0.5);
        }

        percentageUpBias = Math.min(Math.max(percentageUpBias, 10), 90);
        let percentageDownBias = 100 - percentageUpBias;

        document.getElementById('fill-up').style.width = `${percentageUpBias}%`;
        document.getElementById('fill-down').style.width = `${percentageDownBias}%`;
        document.getElementById('text-bias-up').innerText = `${percentageUpBias.toFixed(1)}%`;
        document.getElementById('text-bias-down').innerText = `${percentageDownBias.toFixed(1)}%`;

        document.getElementById('row-live-price').innerText = `$${livePrice.toFixed(2)}`;
        document.getElementById('row-lock-price').innerText = `$${baselineLockPrice.toFixed(2)}`;
        document.getElementById('row-rsi').innerText = trackingRsi.toFixed(2);

        const heroBadge = document.getElementById('hero-signal');
        if (percentageUpBias >= percentageDownBias) {
            computedSignal = "UP";
            heroBadge.innerText = "VOTE UP";
            heroBadge.className = "prediction-badge dir-up";
        } else {
            computedSignal = "DOWN";
            heroBadge.innerText = "VOTE DOWN";
            heroBadge.className = "prediction-badge dir-down";
        }
    }

    function settleActiveRoundSequence() {
        if (!isConnected || livePrice === 0 || baselineLockPrice === 0) return;

        let marketDirectionResult = livePrice >= baselineLockPrice ? "UP" : "DOWN";
        let isPredictionCorrect = computedSignal === marketDirectionResult;
        let ledgerTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        executionLedger.unshift({
            time: ledgerTimestamp,
            call: computedSignal,
            outcome: marketDirectionResult,
            resultMatched: isPredictionCorrect,
            openVal: baselineLockPrice.toFixed(2),
            closeVal: livePrice.toFixed(2)
        });

        if (executionLedger.length > 30) executionLedger.pop();

        localStorage.setItem('terminal_ledger_v4', JSON.stringify(executionLedger));
        renderLedgerViewportUI();
    }

    function renderLedgerViewportUI() {
        const viewport = document.getElementById('ledger-viewport');
        if (executionLedger.length === 0) {
            viewport.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 0.85rem; padding-top: 40px;">Waiting for first live 5m interval settlement.</div>`;
            document.getElementById('stat-accuracy').innerText = "0.00%";
            return;
        }

        viewport.innerHTML = '';
        let accurateWinsCount = 0;

        executionLedger.forEach(entry => {
            if (entry.resultMatched) accurateWinsCount++;

            const entryElement = document.createElement('div');
            entryElement.className = 'ledger-entry';
            entryElement.innerHTML = `
                <div>
                    <span style="color: var(--text-muted); font-family: var(--font-mono);">[${entry.time}]</span>
                    <span style="margin-left: 10px;">Lock: $${entry.openVal} → Close: $${entry.closeVal}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 14px;">
                    <span>Pick: <strong class="${entry.call === 'UP' ? 'dir-up' : 'dir-down'}">${entry.call}</strong></span>
                    <span class="status-pill ${entry.resultMatched ? 'pill-win' : 'pill-loss'}">${entry.resultMatched ? 'WIN' : 'LOSS'}</span>
                </div>
            `;
            viewport.appendChild(entryElement);
        });

        let currentWinPercent = (accurateWinsCount / executionLedger.length) * 100;
        document.getElementById('stat-accuracy').innerText = `${currentWinPercent.toFixed(2)}%`;
    }

    function startSystemClocks() {
        streamMarketMetrics();

        setInterval(async () => {
            const timeData = new Date();
            const systemMinutes = timeData.getMinutes();
            const systemSeconds = timeData.getSeconds();

            const minutesRemaining = 4 - (systemMinutes % 5);
            const secondsRemaining = 59 - systemSeconds;

            document.getElementById('stat-timer').innerText = 
                `${String(minutesRemaining).padStart(2, '0')}:${String(secondsRemaining).padStart(2, '0')}`;

            let computedIntervalEpochBlockId = Math.floor(Date.now() / 300000);
            if (workingEpochId === 0) workingEpochId = computedIntervalEpochBlockId;

            if (computedIntervalEpochBlockId !== workingEpochId) {
                // Only settle a round if we actually have real data
                if (isConnected) settleActiveRoundSequence();
                workingEpochId = computedIntervalEpochBlockId;
                await streamMarketMetrics();
            }

            if (systemSeconds % 5 === 0) {
                await streamMarketMetrics();
            }
        }, 1000);
    }

    (function initializeTerminalOrchestration() {
        renderLedgerViewportUI();
        startSystemClocks();
    })();
</script>
</body>
</html>
